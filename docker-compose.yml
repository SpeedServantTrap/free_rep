x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-scanner-defaults: &scanner-defaults
  network_mode: host
  restart: unless-stopped
  privileged: true
  cap_add:
    - NET_RAW
    - NET_ADMIN
    - SYS_RAWIO
  security_opt:
    - apparmor:unconfined
    - seccomp:unconfined
  logging: *default-logging

services:

  mongodb:
    image: mongo:4.4
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - scanner-net
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging: *default-logging

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - scanner-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - scanner-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    # Use host networking so mongo-express reaches MongoDB via localhost:27017.
    # This avoids the iptables FORWARD DROP issue on the scanner-net bridge.
    network_mode: host
    environment:
      ME_CONFIG_MONGODB_SERVER: localhost
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_MONGODB_URL: mongodb://localhost:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
      # Default port is 8081 — no ports: mapping needed with host networking
      ME_CONFIG_SITE_PORT: "8081"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-app
    network_mode: host
    environment:
      RABBITMQ_URL:     amqp://guest:guest@localhost:5672/
      MONGODB_URI:      mongodb://localhost:27017
      MONGODB_DATABASE: network_scanner
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/scanner-vniitf.ru+1.pem:/etc/nginx/certs/cert.pem:ro
      - ./frontend/scanner-vniitf.ru+1-key.pem:/etc/nginx/certs/key.pem:ro
    extra_hosts:
      - "backend-app:host-gateway"
    networks:
      - scanner-net
    depends_on:
      - backend
    restart: unless-stopped
    logging: *default-logging


  scanner_nmap:
    <<: *scanner-defaults
    build:
      context: ./scanner_nmap
      dockerfile: Dockerfile
    container_name: scanner-nmap
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      SCANNER_NAME: nmap_service
    depends_on:
      rabbitmq:
        condition: service_healthy

  scanner_arp:
    <<: *scanner-defaults
    build:
      context: ./scanner_arp
      dockerfile: Dockerfile
    container_name: scanner-arp
    env_file:
      - ./scanner_arp/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      SCANNER_NAME: arp_service
      SCANNER_TIMEOUT: 10s
      SCANNER_MAX_RETRIES: 3
      SCANNER_RETRY_DELAY: 1s
    depends_on:
      rabbitmq:
        condition: service_healthy

  scanner_icmp:
    <<: *scanner-defaults
    build:
      context: ./scanner_icmp
      dockerfile: Dockerfile
    container_name: scanner-icmp
    environment:
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      SCANNER_NAME: icmp_service
      PING_TIMEOUT: 5s
    depends_on:
      rabbitmq:
        condition: service_healthy

  scanner_tcp:
    <<: *scanner-defaults
    build:
      context: ./tcp_scanner
      dockerfile: Dockerfile
    container_name: scanner-tcp
    environment:
      RABBITMQ_URL:           amqp://guest:guest@localhost:5672/
      SCANNER_NAME:           tcp_service
      MINIO_ENDPOINT:         localhost:9000
      MINIO_ACCESS_KEY:       minioadmin
      MINIO_SECRET_KEY:       minioadmin
      MINIO_BUCKET:           tcp-raw
      TCP_CONN_TIMEOUT:       5s
      TCP_READ_TIMEOUT:       10s
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  change_detector:
    build:
      context: ./change_detector
      dockerfile: Dockerfile
    container_name: change-detector
    network_mode: host
    environment:
      MONGODB_URI:        mongodb://localhost:27017
      MONGODB_DATABASE:   network_scanner
      RABBITMQ_URL:       amqp://guest:guest@localhost:5672/
      DETECTION_INTERVAL: "30"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

networks:
  scanner-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  mongodb_data:
  rabbitmq_data:
  minio_data:
